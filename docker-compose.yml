services:
    pg:
        image: postgres:16.6-alpine3.20
        container_name: postgres_laravel
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=docker
            - POSTGRES_PASSWORD=4892ae0405ce4bff9d84cb65200788d4
            - POSTGRES_DB=app-laravel
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - laravel

volumes:
    postgres_data:

networks:
    laravel:

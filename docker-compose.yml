services:
    watchtower:
        image: containrrr/watchtower:latest
        container_name: watchtower
        restart: unless-stopped
        networks:
            - laravel
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        environment:
            - WATCHTOWER_SCOPE=php-only
            - WATCHTOWER_CLEANUP=true
            - WATCHTOWER_POLL_INTERVAL=300

    cloudflared:
        image: cloudflare/cloudflared:latest
        container_name: cloudflared
        command: >
            tunnel --no-autoupdate run
            --token ${CLOUDFLARE_TUNNEL_TOKEN}
        networks:
            - laravel
        restart: unless-stopped

    traefik:
        image: traefik:v3.6.9
        container_name: laravel-traefik
        command:
            - "--api.dashboard=true"
            - "--providers.docker=true"
            - "--entrypoints.web.address=:80"
            - "--providers.docker.exposedbydefault=false"
        ports:
            - "80:80"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        networks:
            - laravel
        labels:
            - "traefik.enable=true"

            - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN}`)"
            - "traefik.http.routers.traefik.entrypoints=web"
            - "traefik.http.routers.traefik.service=api@internal"

            - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_BASIC_AUTH}"
            - "traefik.http.routers.traefik.middlewares=dashboard-auth"

    nginx:
        image: nginx:alpine
        container_name: laravel-nginx
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - laravel
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.laravel.rule=Host(`${APP_DOMAIN}`)"
            - "traefik.http.routers.laravel.entrypoints=web"
            - "traefik.http.services.laravel.loadbalancer.server.port=80"

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: laravel-php
        networks:
            - laravel
        depends_on:
            - mysql
        labels:
            - "com.centurylinklabs.watchtower.scope=php-only"

    mysql:
        image: mysql:8.0.43-debian
        container_name: laravel-mysql
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - laravel

volumes:
    mysql_data:

networks:
    laravel:
